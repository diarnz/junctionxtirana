<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floor plan</title>
    <link rel="stylesheet" href="floorplan-editor.css" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08080c;
      }
      #plan-wrap {
        width: 100%;
        height: 100%;
      }
      #plan-canvas {
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="plan-wrap">
      <canvas id="plan-canvas"></canvas>
    </div>
    <script type="module" src="src/planView.js"></script>
  </body>
</html>
